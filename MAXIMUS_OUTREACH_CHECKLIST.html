<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maximus Outreach — Build Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    line-height: 1.6;
    padding: 20px;
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid #262626;
    margin-bottom: 30px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fafafa;
    margin-bottom: 8px;
  }
  header p {
    color: #737373;
    font-size: 14px;
  }

  .progress-bar-container {
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 30px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-stats span {
    font-size: 14px;
    color: #a3a3a3;
  }
  .progress-stats .done-count {
    font-size: 20px;
    font-weight: 700;
    color: #22c55e;
  }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #262626;
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    border-radius: 5px;
    transition: width 0.4s ease;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #e5e5e5;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .controls button:hover {
    background: #262626;
    border-color: #3b82f6;
  }
  .controls button.active {
    background: #3b82f6;
    border-color: #3b82f6;
    color: #fff;
  }
  .controls .export-btn {
    margin-left: auto;
    background: #1a3a1a;
    border-color: #22c55e;
    color: #22c55e;
  }
  .controls .export-btn:hover {
    background: #22c55e;
    color: #000;
  }

  .phase {
    background: #111111;
    border: 1px solid #262626;
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .phase.all-done {
    border-color: #166534;
  }
  .phase-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
    transition: background 0.2s;
  }
  .phase-header:hover {
    background: #1a1a1a;
  }
  .phase-toggle {
    color: #525252;
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .phase.open .phase-toggle {
    transform: rotate(90deg);
  }
  .phase-title {
    font-size: 16px;
    font-weight: 600;
    color: #fafafa;
    flex: 1;
  }
  .phase-role {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .role-backend { background: #1e3a5f; color: #60a5fa; }
  .role-frontend { background: #3b1f5e; color: #c084fc; }
  .role-qa { background: #5e3b1f; color: #fb923c; }
  .phase-count {
    font-size: 12px;
    color: #737373;
    flex-shrink: 0;
    min-width: 50px;
    text-align: right;
  }
  .phase-count.complete { color: #22c55e; }

  .phase-body {
    display: none;
    padding: 0 20px 16px;
  }
  .phase.open .phase-body {
    display: block;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .task:last-child { border-bottom: none; }

  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid #404040;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
    position: relative;
  }
  .task input[type="checkbox"]:hover {
    border-color: #3b82f6;
  }
  .task input[type="checkbox"]:checked {
    background: #22c55e;
    border-color: #22c55e;
  }
  .task input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #000;
    font-size: 13px;
    font-weight: 700;
  }

  .task-info { flex: 1; }
  .task-id {
    font-size: 12px;
    color: #3b82f6;
    font-weight: 600;
    font-family: 'Courier New', monospace;
  }
  .task-name {
    font-size: 14px;
    color: #d4d4d4;
  }
  .task.done .task-name {
    color: #525252;
    text-decoration: line-through;
  }
  .task-test {
    font-size: 12px;
    color: #737373;
    margin-top: 2px;
  }

  .summary-box {
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 30px;
    margin-bottom: 30px;
  }
  .summary-box h3 {
    color: #fafafa;
    font-size: 16px;
    margin-bottom: 12px;
  }
  .summary-box pre {
    background: #0a0a0a;
    border: 1px solid #262626;
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: #a3a3a3;
    overflow-x: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 400px;
    overflow-y: auto;
  }
  .summary-box button {
    margin-top: 10px;
    padding: 8px 20px;
    background: #3b82f6;
    border: none;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .summary-box button:hover { background: #2563eb; }
  .copied-toast {
    display: none;
    color: #22c55e;
    font-size: 13px;
    margin-left: 10px;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .phase-header { padding: 12px 14px; flex-wrap: wrap; }
    .phase-role { display: none; }
    .controls { gap: 6px; }
    .controls button { padding: 6px 12px; font-size: 12px; }
  }
</style>
</head>

<header>
  <h1>⚡ Maximus Outreach — Build Checklist</h1>
  <p>Check tasks as you complete them. Progress saves automatically in your browser.</p>
</header>

<div class="progress-bar-container">
  <div class="progress-stats">
    <span><span class="done-count" id="doneCount">0</span> / <span id="totalCount">0</span> tasks</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<div class="controls">
  <button class="active" onclick="filterTasks('all')">All</button>
  <button onclick="filterTasks('pending')">Pending</button>
  <button onclick="filterTasks('done')">Done</button>
  <button onclick="filterTasks('backend')" style="color:#60a5fa">Backend</button>
  <button onclick="filterTasks('frontend')" style="color:#c084fc">Frontend</button>
  <button onclick="filterTasks('qa')" style="color:#fb923c">QA</button>
  <button class="export-btn" onclick="generateSummary()">📋 Copy Status for LLM</button>
</div>

<div id="phases"></div>

<div class="summary-box" id="summaryBox" style="display:none">
  <h3>📋 Paste This to LLM Before Starting</h3>
  <pre id="summaryText"></pre>
  <button onclick="copySummary()">Copy to Clipboard</button>

const STORAGE_KEY = 'maximus_outreach_checklist';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentFilter = 'all';

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = '';
  let totalTasks = 0;
  let doneTasks = 0;

  PHASES.forEach(phase => {
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    if (state[`phase_${phase.id}_open`]) phaseEl.classList.add('open');

    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    const phaseTotal = phase.tasks.length;
    totalTasks += phaseTotal;
    doneTasks += phaseDone;

    if (phaseDone === phaseTotal) phaseEl.classList.add('all-done');

    // Filter visibility
    if (currentFilter === 'backend' && phase.role !== 'backend') { phaseEl.style.display = 'none'; }
    if (currentFilter === 'frontend' && phase.role !== 'frontend') { phaseEl.style.display = 'none'; }
    if (currentFilter === 'qa' && phase.role !== 'qa') { phaseEl.style.display = 'none'; }
    if (currentFilter === 'done' && phaseDone === 0) { phaseEl.style.display = 'none'; }
    if (currentFilter === 'pending' && phaseDone === phaseTotal) { phaseEl.style.display = 'none'; }

    const roleClass = `role-${phase.role}`;
    const roleLabel = phase.role === 'backend' ? 'Backend' : phase.role === 'frontend' ? 'Frontend' : 'QA';

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${phase.id})">
        <span class="phase-toggle">▶</span>
        <span class="phase-title">Phase ${phase.id}: ${phase.title}</span>
        <span class="phase-role ${roleClass}">${roleLabel}</span>
        <span class="phase-count ${phaseDone === phaseTotal ? 'complete' : ''}">${phaseDone}/${phaseTotal}</span>
      </div>
      <div class="phase-body">
        ${phase.tasks.map(task => {
          const checked = state[task.id] ? 'checked' : '';
          const doneClass = state[task.id] ? 'done' : '';
          let visible = true;
          if (currentFilter === 'done' && !state[task.id]) visible = false;
          if (currentFilter === 'pending' && state[task.id]) visible = false;
          return `
            <div class="task ${doneClass}" ${!visible ? 'style="display:none"' : ''}>
              <input type="checkbox" ${checked} onchange="toggleTask('${task.id}')">
              <div class="task-info">
                <span class="task-id">${task.id}</span>
                <span class="task-name">${task.name}</span>
                <div class="task-test">Test: ${task.test}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    container.appendChild(phaseEl);
  });

  document.getElementById('doneCount').textContent = doneTasks;
  document.getElementById('totalCount').textContent = totalTasks;
  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function togglePhase(phaseId) {
  state[`phase_${phaseId}_open`] = !state[`phase_${phaseId}_open`];
  saveState(state);
  render();
}

function toggleTask(taskId) {
  state[taskId] = !state[taskId];
  saveState(state);
  render();
}

function filterTasks(filter) {
  currentFilter = filter;
  document.querySelectorAll('.controls button:not(.export-btn)').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function generateSummary() {
  let lines = ['## Maximus Outreach — Build Status\n'];
  let totalDone = 0, totalAll = 0;

  PHASES.forEach(phase => {
    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    const phaseTotal = phase.tasks.length;
    totalDone += phaseDone;
    totalAll += phaseTotal;
    const status = phaseDone === phaseTotal ? '✅' : phaseDone > 0 ? '🔶' : '⬜';

    lines.push(`${status} **Phase ${phase.id}: ${phase.title}** (${phaseDone}/${phaseTotal})`);
    phase.tasks.forEach(task => {
      const check = state[task.id] ? '[x]' : '[ ]';
      lines.push(`  - ${check} ${task.id}: ${task.name}`);
    });
    lines.push('');
  });

  lines.unshift(`**Progress: ${totalDone}/${totalAll} tasks (${Math.round((totalDone/totalAll)*100)}%)**\n`);
  lines.push('---');
  lines.push('Resume from the first unchecked task. All checked tasks are complete and tested.');

  const text = lines.join('\n');
  document.getElementById('summaryText').textContent = text;
  document.getElementById('summaryBox').style.display = 'block';
  document.getElementById('summaryBox').scrollIntoView({ behavior: 'smooth' });
}

function copySummary() {
  const text = document.getElementById('summaryText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copiedToast');
    toast.style.display = 'inline';
    setTimeout(() => toast.style.display = 'none', 2000);
  });
}

render();
</script>
</body>
